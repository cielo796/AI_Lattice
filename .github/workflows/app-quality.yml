name: App Quality

on:
  pull_request:
    paths:
      - "app/**"
      - ".github/workflows/app-quality.yml"
  push:
    branches:
      - main
      - "feat/**"
    paths:
      - "app/**"
      - ".github/workflows/app-quality.yml"

jobs:
  quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      - run: npm run check:mojibake
      - run: npm run lint
      - run: npm test
      - run: npx tsc --noEmit --pretty false

  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: stitch
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d stitch"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: app
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/stitch?schema=public
      DEMO_AUTO_SEED: "true"
      OPENAI_API_KEY: ""
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      - run: npm run db:generate
      - run: npm run db:migrate:deploy
      - run: npm run db:health
      - run: npx playwright install --with-deps chromium
      - run: npm run e2e
